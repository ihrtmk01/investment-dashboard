const MC = { US:["bg-sky-50","text-sky-600","🇺🇸"], JP:["bg-rose-50","text-rose-500","🇯🇵"], EU:["bg-violet-50","text-violet-500","🇪🇺"], KR:["bg-emerald-50","text-emerald-600","🇰🇷"], CN:["bg-amber-50","text-amber-600","🇨🇳"], IN:["bg-orange-50","text-orange-500","🇮🇳"], BR:["bg-lime-50","text-lime-600","🇧🇷"], TW:["bg-teal-50","text-teal-600","🇹🇼"], GB:["bg-indigo-50","text-indigo-500","🇬🇧"], AU:["bg-yellow-50","text-yellow-600","🇦🇺"], CA:["bg-cyan-50","text-cyan-600","🇨🇦"], DK:["bg-pink-50","text-pink-500","🇩🇰"], DE:["bg-slate-100","text-slate-500","🇩🇪"], FR:["bg-blue-50","text-blue-500","🇫🇷"], ES:["bg-red-50","text-red-500","🇪🇸"] };
const mc = (m) => MC[m] || ["bg-gray-100","text-gray-700","🌐"];

const Dots = ({ v }) => <div className="flex gap-0.5">{Array.from({length:5},(_,i)=><div key={i} className={`w-1.5 h-1.5 rounded-full ${i<v?"bg-indigo-500":"bg-gray-200"}`}/>)}</div>;

const Card = ({ title, sub, children, className="" }) => (
  <div className={`rounded-2xl p-5 ${className}`}>
    {title && <div className="mb-4"><h3 className="text-lg font-bold text-gray-900">{title}</h3>{sub && <p className="text-xs text-gray-600 mt-0.5">{sub}</p>}</div>}
    {children}
  </div>
);

const TT = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return <div className="bg-white rounded-xl border border-gray-100 px-4 py-3 text-xs" style={{boxShadow:"0 4px 12px rgba(0,0,0,0.08)"}}><p className="text-gray-600 mb-1">{label}</p>{payload.map((p,i)=><p key={i} className="font-medium text-gray-700"><span style={{color:p.color}}>{p.name}:</span> ¥{typeof p.value==="number"?p.value.toLocaleString()+"万":p.value}</p>)}</div>;
};

/* ================================================================ MAIN ================================================================ */
function InvestmentDashboard() {
  const [activeDB, setActiveDB] = useState("all");
  const [activeTab, setActiveTab] = useState("stocks");
  const [viewMode, setViewMode] = useState("card");
  const [selectedStock, setSelectedStock] = useState(null);
  const [catFilter, setCatFilter] = useState("all");
  const [searchQ, setSearchQ] = useState("");
  const [initCap, setInitCap] = useState(300);
  const [monthly, setMonthly] = useState(5);
  const [expandedFund, setExpandedFund] = useState(null);
  const [expandedTopic, setExpandedTopic] = useState(null);

  /* Filter stocks */
  const dbStocks = useMemo(() => {
    if (activeDB === "all") return ALL_STOCKS;
    return ALL_STOCKS.filter(s => s.tags.includes(activeDB));
  }, [activeDB]);

  const categories = useMemo(() => {
    if (activeDB === "all") return null;
    return CATEGORY_MAP[activeDB];
  }, [activeDB]);

  const catNames = categories ? Object.keys(categories) : [];

  const filtered = useMemo(() => {
    let list = dbStocks;
    if (categories && catFilter !== "all") {
      const tickers = categories[catFilter] || [];
      list = list.filter(s => tickers.includes(s.ticker));
    }
    if (searchQ) {
      const q = searchQ.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || s.ticker.toLowerCase().includes(q) || s.sector.toLowerCase().includes(q) || s.memo.toLowerCase().includes(q));
    }
    return list;
  }, [dbStocks, categories, catFilter, searchQ]);

  /* Grouped view for category display */
  const grouped = useMemo(() => {
    if (!categories || catFilter !== "all") return null;
    return Object.entries(categories).map(([name, tickers]) => ({
      name,
      stocks: tickers.map(t => ALL_STOCKS.find(s => s.ticker === t)).filter(Boolean),
    }));
  }, [categories, catFilter]);

  /* Simulation */
  const sims = useMemo(() => {
    const rates = [
      { label: "保守的(5%)", rate: 0.05, color: "#94a3b8" },
      { label: "標準(10%)", rate: 0.10, color: "#6366f1" },
      { label: "積極的(15%)", rate: 0.15, color: "#0ea5e9" },
      { label: "超積極的(25%)", rate: 0.25, color: "#f59e0b" },
    ];
    return rates.map(({label,rate,color}) => {
      const d = []; let t = initCap;
      for (let y=0;y<=10;y++) { d.push({year:`${y}年`,value:Math.round(t)}); t = t*(1+rate)+monthly*12; }
      return {label,data:d,color,final:d[10].value};
    });
  }, [initCap, monthly]);

  const simChart = sims[0].data.map((d,i) => {
    const o = {year:d.year,"目標1億":10000};
    sims.forEach(s => { o[s.label] = s.data[i].value; });
    return o;
  });

  /* Render helpers */
  const renderTableRows = (stocks) => stocks.map(s => (
    <tr key={s.ticker} onClick={() => setSelectedStock(s)} className={`cursor-pointer transition ${selectedStock?.ticker===s.ticker ? "bg-indigo-50" : "hover:bg-gray-50"}`}>
      <td className="py-3 px-2"><span className={`text-xs font-medium px-1.5 py-0.5 rounded-full ${mc(s.market)[0]} ${mc(s.market)[1]}`}>{mc(s.market)[2]} {s.market}</span></td>
      <td className="py-3 px-2 text-xs text-gray-600 font-mono">{s.ticker}</td>
      <td className="py-3 px-2"><p className="text-sm font-medium text-gray-900">{s.name}</p><p className="text-xs text-gray-600 mt-0.5 line-clamp-1">{s.summary}</p></td>
      <td className={`py-3 px-2 text-sm text-right font-mono font-medium ${s.change>=0?"text-emerald-600":"text-red-500"}`}>{s.change>=0?"+":""}{s.change}%</td>
      <td className="py-3 px-2 text-sm text-right font-mono text-gray-700">{s.pe||"—"}</td>
      <td className="py-3 px-2 text-sm text-right font-mono text-gray-700">{s.div?`${s.div}%`:"—"}</td>
      <td className="py-3 px-2 text-right"><Dots v={s.rating}/></td>
    </tr>
  ));

  const renderCards = (stocks) => (
    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      {stocks.map(s => (
        <div key={s.ticker} onClick={() => setSelectedStock(s)}
          className={`rounded-xl p-4 cursor-pointer transition border shadow-sm ${selectedStock?.ticker===s.ticker ? "bg-indigo-50 border-indigo-200" : "bg-white border-gray-200 hover:border-gray-300 hover:shadow-md"}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className={`text-xs font-medium px-1.5 py-0.5 rounded-full ${mc(s.market)[0]} ${mc(s.market)[1]}`}>{mc(s.market)[2]} {s.market}</span>
              <span className="text-xs text-gray-600 font-mono">{s.ticker}</span>
            </div>
            <span className={`text-sm font-bold ${s.change>=0?"text-emerald-600":"text-red-500"}`}>{s.change>=0?"+":""}{s.change}%</span>
          </div>
          <h4 className="text-sm font-semibold text-gray-900">{s.name}</h4>
          <p className="text-xs text-gray-600 mt-1 leading-relaxed line-clamp-2">{s.summary}</p>
          <div className="flex items-center justify-between mt-3 pt-2 border-t border-gray-100">
            <div className="flex gap-3 text-xs text-gray-700">
              {s.pe > 0 && <span>PER {s.pe}x</span>}
              {s.div > 0 && <span>配当 {s.div}%</span>}
            </div>
            <Dots v={s.rating}/>
          </div>
          <div className="flex gap-1 mt-2">
            {s.tags.filter(t=>ROLE_BADGE[t]).map(t => <span key={t} className={`text-xs px-1.5 py-0.5 rounded ${ROLE_BADGE[t].bg} ${ROLE_BADGE[t].text}`}>{ROLE_BADGE[t].emoji} {ROLE_BADGE[t].label}</span>)}
          </div>
        </div>
      ))}
    </div>
  );

  const renderTable = (stocks) => (
    <div className="overflow-x-auto bg-white rounded-xl border border-gray-200 shadow-sm">
      <table className="w-full">
        <thead><tr className="border-b border-gray-200">
          {["市場","コード","銘柄名・概要","変動","PER","配当","評価"].map((h,i) => (
            <th key={h} className={`py-2 px-2 text-xs font-medium text-gray-600 ${i>=3?"text-right":"text-left"}`}>{h}</th>
          ))}
        </tr></thead>
        <tbody className="divide-y divide-gray-200">{renderTableRows(stocks)}</tbody>
      </table>
    </div>
  );

  const DetailPanel = () => {
    const s = selectedStock;
    if (!s) return <div className="py-16 text-center"><p className="text-sm text-gray-700">銘柄を選択してください</p></div>;
    return (
      <div className="space-y-4">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${mc(s.market)[0]} ${mc(s.market)[1]}`}>{mc(s.market)[2]} {s.market}</span>
            <span className="text-xs text-gray-600 font-mono">{s.ticker}</span>
          </div>
          <span className={`text-lg font-bold ${s.change>=0?"text-emerald-600":"text-red-500"}`}>{s.change>=0?"+":""}{s.change}%</span>
        </div>
        <h3 className="text-lg font-bold text-gray-900">{s.name}</h3>
        <p className="text-sm text-gray-700 leading-relaxed">{s.summary}</p>
        <div className="grid grid-cols-2 gap-2.5">
          {[["PER",s.pe?`${s.pe}x`:"—"],["PBR","—"],["配当",s.div?`${s.div}%`:"—"],["セクター",s.sector]].map(([l,v])=>(
            <div key={l} className="bg-gray-50 rounded-xl p-3"><span className="text-xs text-gray-600">{l}</span><p className="text-base font-semibold text-gray-800 mt-0.5">{v}</p></div>
          ))}
        </div>
        <div><span className="text-xs text-gray-600">注目ポイント</span><p className="text-sm text-gray-700 mt-1">{s.memo}</p></div>
        {s.pe > 0 && <div>
          <span className="text-xs text-gray-600 block mb-2">バリュエーション</span>
          <div className="w-full bg-gray-100 rounded-full h-1.5">
            <div className="h-1.5 rounded-full transition-all" style={{width:`${Math.min((s.pe/70)*100,100)}%`,background:s.pe<15?"#10b981":s.pe<25?"#6366f1":s.pe<40?"#f59e0b":"#ef4444"}}/>
          </div>
          <p className="text-xs text-gray-600 mt-1">{s.pe<15?"割安":s.pe<25?"適正":s.pe<40?"やや割高":"高バリュエーション"}</p>
        </div>}
        <div className="flex items-center gap-2"><span className="text-xs text-gray-600">評価</span><Dots v={s.rating}/></div>
        <div className="flex gap-1.5">{s.tags.filter(t=>ROLE_BADGE[t]).map(t=><span key={t} className={`text-xs px-2 py-0.5 rounded-full ${ROLE_BADGE[t].bg} ${ROLE_BADGE[t].text}`}>{ROLE_BADGE[t].emoji} {ROLE_BADGE[t].label}</span>)}{s.tags.includes("takaichi")&&<span className="text-xs px-2 py-0.5 rounded-full bg-rose-50 text-rose-700">🇯🇵 高市政策</span>}</div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-gray-50 text-gray-900" style={{fontFamily:"'Inter','Noto Sans JP',system-ui,sans-serif"}}>
      {/* Sticky Header */}
      <div className="bg-white sticky top-0 z-10 border-b border-gray-200 shadow-sm">
        <div className="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-2">
            <p className="text-xs text-gray-700 font-medium tracking-widest uppercase mr-2 hidden sm:block">Dashboard</p>
            {[{id:"all",label:"統合",emoji:"📊"},...Object.entries(DB_META).map(([id,m])=>({id,...m}))].map(d=>(
              <button key={d.id} onClick={()=>{setActiveDB(d.id);setCatFilter("all");setSelectedStock(null);}}
                className={`px-3.5 py-1.5 rounded-full text-xs font-medium transition border ${activeDB===d.id?"bg-indigo-600 text-white border-indigo-600 shadow-sm":"bg-white text-gray-700 border-gray-300 hover:bg-gray-50 hover:border-gray-400"}`}>
                {d.emoji} {d.label}
              </button>
            ))}
          </div>
          <span className="text-xs text-gray-600">{filtered.length}銘柄</span>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-6 pt-6 pb-12">
        {/* Purpose banner */}
        {activeDB !== "all" && (
          <div className="mb-6 rounded-2xl bg-white p-5 border border-gray-200 shadow-sm">
            <h1 className="text-xl font-bold text-gray-900">{DB_META[activeDB].emoji} {DB_META[activeDB].label}</h1>
            <p className="text-sm text-gray-600 mt-1">{DB_META[activeDB].purpose}</p>
          </div>
        )}
        {activeDB === "all" && (
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">投資学習ダッシュボード</h1>
          </div>
        )}

        {/* Tabs */}
        <nav className="flex gap-1 mb-6 border-b border-gray-200">
          {[["stocks","銘柄一覧"],["nisa","NISAインデックス"],["sim","シミュレーション"],["econ","経済指標"],["learn","学習マップ"]].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              className={`px-5 py-2 text-sm font-medium border-b-2 transition ${activeTab===id?"border-indigo-500 text-gray-900":"border-transparent text-gray-600 hover:text-gray-900"}`}>
              {label}
            </button>
          ))}
        </nav>

        {/* ========== STOCKS ========== */}
        {activeTab === "stocks" && (
          <div className="space-y-4">
            {/* Controls */}
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div className="flex gap-1.5 flex-wrap flex-1">
                {categories && <>
                  <button onClick={()=>setCatFilter("all")} className={`px-3 py-1.5 rounded-full text-xs font-medium transition border ${catFilter==="all"?"bg-indigo-600 text-white border-indigo-600 shadow-sm":"bg-white text-gray-700 border-gray-300 hover:bg-gray-50 hover:border-gray-400"}`}>
                    すべて
                  </button>
                  {catNames.map(c=>(
                    <button key={c} onClick={()=>setCatFilter(c)} className={`px-3 py-1.5 rounded-full text-xs font-medium transition border ${catFilter===c?"bg-indigo-600 text-white border-indigo-600 shadow-sm":"bg-white text-gray-700 border-gray-300 hover:bg-gray-50 hover:border-gray-400"}`}>
                      {c}
                    </button>
                  ))}
                </>}
                {activeDB === "all" && (
                  <input type="text" value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="銘柄名・コード・セクターで検索..."
                    className="px-3 py-1.5 rounded-full text-xs border border-gray-200 bg-white text-gray-700 w-64 focus:outline-none focus:border-indigo-300"/>
                )}
              </div>
              <div className="flex gap-1 bg-gray-100 rounded-lg p-0.5">
                <button onClick={()=>setViewMode("table")} className={`px-3 py-1.5 rounded-md text-xs font-medium transition ${viewMode==="table"?"bg-white text-gray-900 shadow-sm":"text-gray-600"}`}>テーブル</button>
                <button onClick={()=>setViewMode("card")} className={`px-3 py-1.5 rounded-md text-xs font-medium transition ${viewMode==="card"?"bg-white text-gray-900 shadow-sm":"text-gray-600"}`}>カード</button>
              </div>
            </div>

            {activeDB !== "all" && categories && <div className="flex gap-1.5 flex-wrap">
              {activeDB === "all" ? null : <input type="text" value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="検索..."
                className="px-3 py-1.5 rounded-full text-xs border border-gray-200 bg-white text-gray-700 w-56 focus:outline-none focus:border-indigo-300"/>}
            </div>}

            <div className="space-y-4">
              {/* Grouped by category */}
              {grouped && catFilter === "all" ? (
                grouped.map(g => (
                  <Card key={g.name} title={g.name} sub={`${g.stocks.length}銘柄`}>
                    {viewMode === "table" ? renderTable(searchQ ? g.stocks.filter(s=>{const q=searchQ.toLowerCase();return s.name.toLowerCase().includes(q)||s.ticker.toLowerCase().includes(q);}) : g.stocks) : renderCards(searchQ ? g.stocks.filter(s=>{const q=searchQ.toLowerCase();return s.name.toLowerCase().includes(q)||s.ticker.toLowerCase().includes(q);}) : g.stocks)}
                  </Card>
                ))
              ) : (
                <Card title={catFilter !== "all" ? catFilter : (activeDB === "all" ? `全銘柄` : undefined)} sub={`${filtered.length}銘柄`}>
                  {viewMode === "table" ? renderTable(filtered) : renderCards(filtered)}
                </Card>
              )}
            </div>

            {/* Detail drawer */}
            {selectedStock && (
              <>
                <div className="fixed inset-0 bg-black/20 z-40 transition-opacity" onClick={()=>setSelectedStock(null)}/>
                <div className="fixed top-0 right-0 h-full w-full max-w-md bg-white z-50 shadow-2xl overflow-y-auto transition-transform border-l border-gray-200">
                  <div className="sticky top-0 bg-white border-b border-gray-200 px-5 py-3 flex items-center justify-between z-10">
                    <h3 className="text-sm font-bold text-gray-900">銘柄詳細</h3>
                    <button onClick={()=>setSelectedStock(null)} className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500 transition text-lg">✕</button>
                  </div>
                  <div className="p-5">
                    <DetailPanel/>
                  </div>
                </div>
              </>
            )}
          </div>
        )}

        {/* ========== NISA INDEX ========== */}
        {activeTab === "nisa" && (
          <div className="space-y-5">
            {/* 概要 */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <h2 className="text-lg font-bold text-gray-900 mb-2">新NISA おすすめインデックス銘柄</h2>
              <p className="text-sm text-gray-600 mb-3">2024年スタートの新NISAで注目のインデックスファンド・ETFを厳選。投資枠タグで対応枠がひと目でわかります。</p>
              <div className="flex gap-3 flex-wrap">
                {Object.entries(NISA_TAGS).map(([k,v])=>(
                  <span key={k} className={`px-3 py-1.5 rounded-full text-xs font-medium border ${v.bg} ${v.text} ${v.border}`}>{v.label}</span>
                ))}
              </div>
            </div>

            {/* カテゴリ別テーブル */}
            {[...new Set(NISA_INDEXES.map(f=>f.cat))].map(cat=>{
              const funds = NISA_INDEXES.filter(f=>f.cat===cat);
              return (
                <div key={cat}>
                  <h2 className="text-lg font-bold text-gray-900 mb-3">{funds[0].flag} {cat}</h2>
                  <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <table className="w-full">
                      <thead><tr className="border-b border-gray-200">
                        <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">ファンド名</th>
                        <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left hidden md:table-cell">運用会社</th>
                        <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">信託報酬</th>
                        <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right hidden sm:table-cell">純資産</th>
                        <th className="py-3 px-4 text-xs font-medium text-gray-600 text-center">NISA枠</th>
                      </tr></thead>
                      <tbody className="divide-y divide-gray-200">
                        {funds.map(f=>{
                          const tag = NISA_TAGS[f.nisa];
                          const isOpen = expandedFund === f.name;
                          return (
                            <Fragment key={f.name}>
                              <tr className="hover:bg-gray-50 transition cursor-pointer" onClick={()=>setExpandedFund(isOpen?null:f.name)}>
                                <td className="py-3 px-4">
                                  <div className="flex items-center gap-2">
                                    <span className={`text-gray-400 text-xs transition-transform inline-block ${isOpen?"rotate-90":""}`}>▶</span>
                                    <div>
                                      <span className="text-sm font-medium text-gray-900">{f.name}</span>
                                      <p className="text-xs text-gray-600 mt-0.5">{f.note}</p>
                                      <span className="text-xs text-gray-500 mt-0.5 inline-block">📊 {f.index}</span>
                                    </div>
                                  </div>
                                </td>
                                <td className="py-3 px-4 text-sm text-gray-700 hidden md:table-cell">{f.provider}</td>
                                <td className="py-3 px-4 text-right"><span className="text-sm font-bold text-indigo-600">{f.cost}%</span></td>
                                <td className="py-3 px-4 text-right text-sm text-gray-700 hidden sm:table-cell">{f.asset}</td>
                                <td className="py-3 px-4 text-center"><span className={`text-xs font-medium px-2.5 py-1 rounded-full border ${tag.bg} ${tag.text} ${tag.border}`}>{tag.label}</span></td>
                              </tr>
                              {isOpen && f.holdings && (
                                <tr>
                                  <td colSpan={5} className="px-4 py-0">
                                    <div className="py-3 px-4 mb-3 bg-gray-50 rounded-lg border border-gray-100">
                                      <p className="text-xs font-semibold text-gray-700 mb-2">📋 主要構成銘柄（上位{f.holdings.length}）</p>
                                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-1.5">
                                        {f.holdings.map((h,i)=>(
                                          <div key={i} className="flex items-center gap-1.5 bg-white rounded-md px-2.5 py-1.5 border border-gray-100">
                                            <span className="text-xs">{h.m}</span>
                                            <span className="text-xs text-gray-800 font-medium truncate">{h.n}</span>
                                            <span className="text-xs text-indigo-500 font-semibold ml-auto whitespace-nowrap">{h.w}</span>
                                          </div>
                                        ))}
                                      </div>
                                    </div>
                                  </td>
                                </tr>
                              )}
                            </Fragment>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}

            {/* NISA枠の解説 */}
            <h2 className="text-lg font-bold text-gray-900">NISA投資枠ガイド</h2>
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <table className="w-full">
                <thead><tr className="border-b border-gray-200">
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">項目</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-center"><span className="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200">つみたて投資枠</span></th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-center"><span className="px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 border border-blue-200">成長投資枠</span></th>
                </tr></thead>
                <tbody className="divide-y divide-gray-200">
                  {[
                    ["年間投資枠","120万円","240万円"],
                    ["非課税保有限度額","—（全体で1,800万円）","1,200万円（内数）"],
                    ["対象商品","金融庁認定の投資信託・ETF","上場株式・投資信託・ETF等"],
                    ["おすすめ戦略","毎月定額のドルコスト平均法","一括投資 or タイミング投資"],
                    ["こんな人に","コツコツ長期で増やしたい","まとまった資金を効率的に運用したい"],
                  ].map(([item,t,s])=>(
                    <tr key={item} className="hover:bg-gray-50 transition">
                      <td className="py-3 px-4 text-sm font-medium text-gray-900">{item}</td>
                      <td className="py-3 px-4 text-sm text-gray-700 text-center">{t}</td>
                      <td className="py-3 px-4 text-sm text-gray-700 text-center">{s}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ========== SIMULATION ========== */}
        {activeTab === "sim" && (
          <div className="space-y-6">
            <h2 className="text-lg font-bold text-gray-900">10年間 資産成長シミュレーション</h2>
            {/* スライダー */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <div className="flex flex-wrap gap-8">
                <div className="flex-1 min-w-48">
                  <div className="flex justify-between mb-2"><label className="text-xs text-gray-600">初期投資額</label><span className="text-sm font-semibold text-gray-800">¥{initCap}万</span></div>
                  <input type="range" min={50} max={1000} step={50} value={initCap} onChange={e=>setInitCap(Number(e.target.value))} className="w-full accent-indigo-500"/>
                </div>
                <div className="flex-1 min-w-48">
                  <div className="flex justify-between mb-2"><label className="text-xs text-gray-600">毎月積立額</label><span className="text-sm font-semibold text-gray-800">¥{monthly}万/月</span></div>
                  <input type="range" min={1} max={30} step={1} value={monthly} onChange={e=>setMonthly(Number(e.target.value))} className="w-full accent-indigo-500"/>
                </div>
              </div>
            </div>
            {/* チャート */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <ResponsiveContainer width="100%" height={380}>
                <LineChart data={simChart}>
                  <CartesianGrid stroke="#f1f5f9" vertical={false}/>
                  <XAxis dataKey="year" tick={{fill:"#94a3b8",fontSize:12}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fill:"#94a3b8",fontSize:12}} tickFormatter={formatYen} axisLine={false} tickLine={false} domain={[0,"auto"]}/>
                  <Tooltip content={<TT/>}/>
                  <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:12}}/>
                  <Line type="monotone" dataKey="保守的(5%)" stroke="#94a3b8" strokeWidth={1.5} dot={false}/>
                  <Line type="monotone" dataKey="標準(10%)" stroke="#6366f1" strokeWidth={2} dot={false}/>
                  <Line type="monotone" dataKey="積極的(15%)" stroke="#0ea5e9" strokeWidth={2} dot={false}/>
                  <Line type="monotone" dataKey="超積極的(25%)" stroke="#f59e0b" strokeWidth={2} dot={false}/>
                  <Line type="monotone" dataKey="目標1億" stroke="#e2e8f0" strokeWidth={1.5} strokeDasharray="6 4" dot={false}/>
                </LineChart>
              </ResponsiveContainer>
            </div>
            {/* 結果テーブル */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <table className="w-full">
                <thead><tr className="border-b border-gray-200">
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">シナリオ</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">年利回り</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">10年後の資産</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">判定</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-200">
                  {sims.map(s=>{const ok=s.final>=10000;return(
                    <tr key={s.label}>
                      <td className="py-3 px-4"><div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:s.color}}/><span className="text-sm font-medium text-gray-900">{s.label}</span></div></td>
                      <td className="py-3 px-4 text-sm font-mono text-gray-700 text-right">{s.label.match(/\d+/)?.[0]}%</td>
                      <td className="py-3 px-4 text-sm font-bold font-mono text-gray-900 text-right">¥{s.final.toLocaleString()}万</td>
                      <td className="py-3 px-4 text-right"><span className={`text-xs font-medium px-2.5 py-1 rounded-full ${ok?"bg-emerald-50 text-emerald-600":"bg-amber-50 text-amber-600"}`}>{ok?"目標達成":`残り¥${(10000-s.final).toLocaleString()}万`}</span></td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ========== ECONOMY ========== */}
        {activeTab === "econ" && (
          <div className="space-y-6">
            {/* 主要経済指標テーブル */}
            <h2 className="text-lg font-bold text-gray-900">主要経済指標</h2>
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <table className="w-full">
                <thead><tr className="border-b border-gray-200">
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">指標</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">現在値</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">変動</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-200">
                  {INDICATORS.map(i=>(
                    <tr key={i.name}>
                      <td className="py-3 px-4 text-sm font-medium text-gray-900">{i.name}</td>
                      <td className="py-3 px-4 text-sm font-bold font-mono text-gray-900 text-right">{i.value}</td>
                      <td className="py-3 px-4 text-right"><span className={`text-xs font-medium px-2.5 py-1 rounded-full ${i.up?"bg-emerald-50 text-emerald-600":"bg-red-50 text-red-500"}`}>{i.change}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* 日本経済・世界経済 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <h2 className="text-lg font-bold text-gray-900 mb-3">🇯🇵 日本経済</h2>
                <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                  <table className="w-full">
                    <thead><tr className="border-b border-gray-200">
                      <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">テーマ</th>
                      <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">状況</th>
                    </tr></thead>
                    <tbody className="divide-y divide-gray-200">
                      {[{l:"日銀政策金利",s:"利上げ局面",c:"text-amber-600",b:"bg-amber-50",d:"インフレ2%目標の持続性を注視"},{l:"円安/円高",s:"円安傾向",c:"text-red-500",b:"bg-red-50",d:"輸出企業にプラス、内需にマイナス"},{l:"賃金上昇",s:"改善中",c:"text-emerald-600",b:"bg-emerald-50",d:"春闘の結果が消費に波及するか"},{l:"企業業績",s:"好調",c:"text-emerald-600",b:"bg-emerald-50",d:"PBR1倍割れ是正の動きが加速"}].map(x=>(
                        <tr key={x.l}>
                          <td className="py-3 px-4"><span className="text-sm font-medium text-gray-900">{x.l}</span><p className="text-xs text-gray-600 mt-0.5">{x.d}</p></td>
                          <td className="py-3 px-4 text-right"><span className={`text-xs font-medium px-2.5 py-1 rounded-full whitespace-nowrap ${x.c} ${x.b}`}>{x.s}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div>
                <h2 className="text-lg font-bold text-gray-900 mb-3">🌐 世界経済</h2>
                <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                  <table className="w-full">
                    <thead><tr className="border-b border-gray-200">
                      <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">テーマ</th>
                      <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">状況</th>
                    </tr></thead>
                    <tbody className="divide-y divide-gray-200">
                      {[{l:"米国FRB",s:"利下げ検討中",c:"text-sky-600",b:"bg-sky-50",d:"インフレ鈍化で利下げ時期が焦点"},{l:"米国景気",s:"ソフトランディング",c:"text-emerald-600",b:"bg-emerald-50",d:"雇用は堅調だが減速の兆候も"},{l:"中国経済",s:"減速懸念",c:"text-red-500",b:"bg-red-50",d:"不動産危機の波及範囲に注意"},{l:"地政学リスク",s:"高止まり",c:"text-amber-600",b:"bg-amber-50",d:"中東・台湾海峡情勢が市場に影響"}].map(x=>(
                        <tr key={x.l}>
                          <td className="py-3 px-4"><span className="text-sm font-medium text-gray-900">{x.l}</span><p className="text-xs text-gray-600 mt-0.5">{x.d}</p></td>
                          <td className="py-3 px-4 text-right"><span className={`text-xs font-medium px-2.5 py-1 rounded-full whitespace-nowrap ${x.c} ${x.b}`}>{x.s}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* 今月の注目イベント */}
            <h2 className="text-lg font-bold text-gray-900">今月の注目イベント</h2>
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <table className="w-full">
                <thead><tr className="border-b border-gray-200">
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">日付</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">イベント</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">市場</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-right">重要度</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-200">
                  {[{d:"3/10",e:"日銀金融政策決定会合",i:"高",t:"🇯🇵 日本"},{d:"3/12",e:"米CPI発表",i:"高",t:"🇺🇸 米国"},{d:"3/19",e:"FOMC",i:"高",t:"🇺🇸 米国"},{d:"3/28",e:"配当権利確定日",i:"中",t:"🇯🇵 日本"}].map(ev=>(
                    <tr key={ev.e} className="hover:bg-gray-50 transition">
                      <td className="py-3 px-4 text-sm font-bold text-indigo-600 font-mono">{ev.d}</td>
                      <td className="py-3 px-4 text-sm font-medium text-gray-900">{ev.e}</td>
                      <td className="py-3 px-4 text-sm text-gray-700">{ev.t}</td>
                      <td className="py-3 px-4 text-right"><span className={`text-xs font-medium px-2.5 py-1 rounded-full ${ev.i==="高"?"bg-red-50 text-red-500":"bg-amber-50 text-amber-500"}`}>{ev.i}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ========== LEARN ========== */}
        {activeTab === "learn" && (
          <div className="space-y-5">
            {/* 投資学習マップ */}
            <div>
              <h2 className="text-lg font-bold text-gray-900 mb-1">投資学習マップ</h2>
              <div className="space-y-3">
                {LEARN.map(c=>(
                  <div key={c.cat} className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-4 py-3 bg-gray-50 border-b border-gray-200">
                      <h3 className="text-sm font-bold text-gray-900">{c.cat}</h3>
                    </div>
                    <div className="divide-y divide-gray-100">
                      {c.items.map((item,i)=>{
                        const key = c.cat+"-"+i;
                        const isOpen = expandedTopic === key;
                        return (
                          <div key={key}>
                            <button className="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition text-left" onClick={()=>setExpandedTopic(isOpen?null:key)}>
                              <span className="w-5 h-5 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center text-xs font-semibold flex-shrink-0">{i+1}</span>
                              <span className="text-sm text-gray-700 flex-1">{item.t}</span>
                              <span className={`text-gray-400 text-xs transition-transform duration-200 ${isOpen?"rotate-90":""}`}>▶</span>
                            </button>
                            {isOpen && (
                              <div className="px-4 pb-3">
                                <div className="ml-8 p-3 bg-indigo-50/50 rounded-lg border border-indigo-100 text-xs text-gray-600 leading-relaxed">{item.d}</div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 今週のチェックリスト */}
            <h2 className="text-lg font-bold text-gray-900">今週のチェックリスト</h2>
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <table className="w-full">
                <thead><tr className="border-b border-gray-200">
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left w-12">✓</th>
                  <th className="py-3 px-4 text-xs font-medium text-gray-600 text-left">タスク</th>
                </tr></thead>
                <tbody className="divide-y divide-gray-200">
                  {["決算カレンダーを確認して注目企業をピックアップ","保有銘柄の最新ニュースをチェック","為替動向と日銀政策をフォロー","月次投資額を入金","ポートフォリオのリバランスを検討"].map((t,i)=>(
                    <tr key={i} className="hover:bg-gray-50 transition">
                      <td className="py-3 px-4"><input type="checkbox" className="w-4 h-4 rounded border-gray-300 text-indigo-500"/></td>
                      <td className="py-3 px-4 text-sm text-gray-700">{t}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        <footer className="mt-10 text-center text-xs text-gray-700 pb-6 space-y-1">
          <p>※ データはサンプルです。投資判断は自己責任で行ってください。</p>
        </footer>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<InvestmentDashboard/>);
  </script>
</body>
</html>
